<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jannic Grebenstein | CONVIRO Media</title>

  <!-- Optional: moderne Schrift (kostenlos) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg0:#07080b;
      --bg1:#0b0d12;
      --card:rgba(255,255,255,.06);
      --card2:rgba(255,255,255,.08);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.68);
      --line:rgba(255,255,255,.12);
      --brand:#5b6cff;   /* <- wenn du die echte Conviro Akzentfarbe hast, hier ersetzen */
      --brand2:#8a5bff;  /* <- optional fürs Gradient */
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 50% -10%, rgba(91,108,255,.22), transparent 60%),
        radial-gradient(700px 420px at 20% 20%, rgba(138,91,255,.14), transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:34px 16px;
    }

    .wrap{
      width:min(520px, 100%);
    }

    .card{
      background: linear-gradient(180deg, var(--card2), var(--card));
      border:1px solid var(--line);
      border-radius:18px;
      padding:22px 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 70px rgba(0,0,0,.55);
    }

    .top{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:16px;
    }

    .avatar{
      width:78px;
      height:78px;
      border-radius:16px;
      object-fit:cover;
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      flex:0 0 auto;
    }

    .name{
      margin:0;
      font-size:18px;
      font-weight:700;
      letter-spacing:-0.2px;
      line-height:1.15;
    }

    .role{
      margin:6px 0 0;
      color:var(--muted);
      font-size:13px;
      line-height:1.25;
    }

    .hero{
      margin:14px 0 14px;
      padding:14px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
    }

    .claim{
      margin:0 0 8px;
      font-size:34px;
      font-weight:800;
      letter-spacing:-0.8px;
      line-height:1.05;
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.35;
    }

    .btn{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:14px 14px;
      margin:10px 0;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.05);
      color:var(--text);
      font-size:15px;
      font-weight:600;
      cursor:pointer;
      text-decoration:none;
      transition: transform .08s ease, background .12s ease, border-color .12s ease;
    }

    .btn:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.07);
      border-color: rgba(255,255,255,.18);
    }

    .btnPrimary{
      border:none;
      background: linear-gradient(90deg, var(--brand), var(--brand2));
      box-shadow: 0 12px 34px rgba(91,108,255,.22);
    }
    .btnPrimary:hover{
      background: linear-gradient(90deg, rgba(91,108,255,.95), rgba(138,91,255,.95));
    }

    .left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:999px;
      background: rgba(255,255,255,.28);
      box-shadow: 0 0 0 4px rgba(255,255,255,.06);
      flex:0 0 auto;
    }
    .btnPrimary .dot{
      background: rgba(255,255,255,.85);
      box-shadow: 0 0 0 4px rgba(255,255,255,.18);
    }

    .label{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .arrow{
      opacity:.7;
      font-weight:700;
    }

    .footer{
      margin-top:14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      color:rgba(255,255,255,.55);
      font-size:12px;
    }

    .chip{
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
    }

    .miniLink{
      color:rgba(255,255,255,.70);
      text-decoration:none;
      border-bottom:1px solid rgba(255,255,255,.18);
    }
    .miniLink:hover{ color:#fff; }

    @media (max-width:420px){
      .claim{ font-size:30px; }
      .avatar{ width:72px; height:72px; border-radius:14px; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="card">
      <div class="top">
        <!-- WICHTIG: Dateiname muss exakt passen -->
        <img class="avatar" src="Jannic.jpg" alt="Jannic Grebenstein">
        <div>
          <h2 class="name">Jannic Grebenstein</h2>
          <p class="role">Founder · Head of Production<br>CONVIRO Media</p>
        </div>
      </div>

      <div class="hero">
        <h1 class="claim">Sichtbarkeit ist<br>kein Zufall.</h1>
        <p class="sub">
          Scanne speichern fertig. Kontakt, Links und Socials in einem Screen.
        </p>
      </div>

      <!-- Buttons -->
      <a class="btn btnPrimary" href="kontakt.vcf">
        <span class="left"><span class="dot"></span><span class="label">Kontakt speichern</span></span>
        <span class="arrow">›</span>
      </a>

      <a class="btn" href="https://www.conviro-media.com" target="_blank" rel="noreferrer">
        <span class="left"><span class="dot"></span><span class="label">Website</span></span>
        <span class="arrow">›</span>
      </a>

      <a class="btn" href="https://www.instagram.com/conviro.media?igsh=Ymo1b2dwNWdwanpm" target="_blank" rel="noreferrer">
        <span class="left"><span class="dot"></span><span class="label">Instagram</span></span>
        <span class="arrow">›</span>
      </a>

      <!-- Optional: Mail / Telefon -->
      <!--
      <a class="btn" href="mailto:hello@conviro-media.com">
        <span class="left"><span class="dot"></span><span class="label">E Mail</span></span>
        <span class="arrow">›</span>
      </a>
      -->

      <div class="footer">
        <span class="chip">NFC Card</span>
        <a class="miniLink" href="https://www.conviro-media.com" target="_blank" rel="noreferrer">conviro-media.com</a>
      </div>
    </section>
  </main>
</body>
</html>
